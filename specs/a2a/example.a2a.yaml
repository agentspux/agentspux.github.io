# SPUX A2A (Agent-to-Agent) handshake spec — example.
# A Primary Agent (e.g. Cline) uses this descriptor to delegate a task
# to a Secondary "Research" agent over a well-known transport.
#
# Place new specs in specs/a2a/<name>.a2a.yaml.

apiVersion: agentspux.ai/a2a/v1
kind: AgentBridge
metadata:
  name: research-delegate
  description: >
    Primary agent (Cline) delegates web-research subtasks to a
    Secondary agent (Perplexity-style) and awaits a structured answer.
  author: rarnado

spec:
  primary:
    id: cline
    role: orchestrator
    capabilities: [code, file_io, terminal]

  secondary:
    id: research-bot
    role: researcher
    capabilities: [web_search, summarize, citations]
    transport:
      type: http
      endpoint: https://api.example.com/agents/research
      auth:
        type: bearer
        env: SPUX_RESEARCH_TOKEN

  handshake:
    # JSON contract sent from primary -> secondary
    request:
      schema:
        type: object
        required: [task_id, query, max_sources]
        properties:
          task_id:     { type: string, description: "UUID for the delegation" }
          query:       { type: string }
          max_sources: { type: integer, default: 5 }
          locale:      { type: string, default: "en-US" }

    # Expected reply shape
    response:
      schema:
        type: object
        required: [task_id, summary, sources]
        properties:
          task_id: { type: string }
          summary: { type: string }
          sources:
            type: array
            items:
              type: object
              required: [title, url]
              properties:
                title:   { type: string }
                url:     { type: string, format: uri }
                snippet: { type: string }

  policy:
    timeout_seconds: 60
    retries: 2
    cache_ttl_seconds: 600
    # Human-in-the-loop: prompt the user before paid/external calls.
    require_user_consent: true
