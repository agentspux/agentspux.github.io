name: Deploy SPUX Site to GitHub Pages

# The site is a single static `index.html` at the repo root, so this
# workflow does almost nothing — it just packages the repo (minus the
# Next.js dashboard and node_modules) and ships it to Pages.
#
# No build step. No framework. No basePath gymnastics.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Stage static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage publish directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site

          # Copy everything except VCS, build artifacts, and the optional
          # Next.js dashboard (which is a separate, non-deployed surface).
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude 'node_modules' \
            --exclude 'ui' \
            --exclude '.DS_Store' \
            ./ _site/

          # Tell GitHub Pages NOT to run Jekyll on this content.
          touch _site/.nojekyll

          echo "---- staged ----"
          ls -la _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
